<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For You</title>

<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400&family=Playfair+Display:wght@500&display=swap" rel="stylesheet">

<style>
* { box-sizing: border-box; }

body {
    margin: 0;
    height: 100vh;
    background: linear-gradient(135deg, #fde2e4, #fadadd, #fff1f5);
    display: flex;
    justify-content: center;
    align-items: center;
    overflow: hidden;
}

/* Sparkles */
.sparkle {
    position: absolute;
    width: 6px;
    height: 6px;
    background: rgba(255, 182, 193, 0.8);
    border-radius: 50%;
    animation: float 6s linear infinite;
}

@keyframes float {
    0% { transform: translateY(100vh) scale(0.5); opacity: 0; }
    20% { opacity: 1; }
    100% { transform: translateY(-10vh) scale(1); opacity: 0; }
}

.card {
    background: white;
    width: 90%;
    max-width: 440px;
    padding: 42px;
    border-radius: 24px;
    box-shadow: 0 30px 60px rgba(231, 84, 128, 0.25);
    animation: pop 0.8s ease forwards;
}

@keyframes pop {
    from { opacity: 0; transform: translateY(20px) scale(0.96); }
    to { opacity: 1; transform: translateY(0) scale(1); }
}

.text {
    font-family: 'JetBrains Mono', monospace;
    font-size: 15px;
    color: #4f2b36;
    line-height: 1.9;
    min-height: 110px;
}

.question {
    font-family: 'Playfair Display', serif;
    font-size: 18px;
    color: #b9375e;
    margin-top: 22px;
    opacity: 0;
    animation: fadeIn 0.6s ease forwards;
}

@keyframes fadeIn {
    to { opacity: 1; }
}

.buttons {
    margin-top: 32px;
    position: relative;
    height: 90px;
}

button {
    padding: 12px 30px;
    border-radius: 28px;
    border: none;
    font-size: 14px;
    cursor: pointer;
    transition: transform 0.15s ease, box-shadow 0.15s ease;
}

button:active {
    transform: scale(0.95);
}

.primary {
    background: #e75480;
    color: white;
    box-shadow: 0 14px 28px rgba(231, 84, 128, 0.4);
}

.primary:hover {
    box-shadow: 0 18px 36px rgba(231, 84, 128, 0.55);
}

.secondary {
    background: transparent;
    border: 1px solid #f0b7c3;
    color: #9a5a6a;
    position: absolute;
    left: 60%;
}
</style>
</head>
<body>

<audio id="bgMusic" loop>
    <source src="love.mp3" type="audio/mpeg">
</audio>

<div class="card">
    <div class="text" id="text"></div>
    <div class="question" id="question"></div>
    <div class="buttons" id="buttons"></div>
</div>

<script>
const textEl = document.getElementById("text");
const questionEl = document.getElementById("question");
const buttonsEl = document.getElementById("buttons");
const music = document.getElementById("bgMusic");

music.volume = 0.45;

/* Sparkles generator */
setInterval(() => {
    const s = document.createElement("div");
    s.className = "sparkle";
    s.style.left = Math.random() * 100 + "vw";
    s.style.animationDuration = 4 + Math.random() * 4 + "s";
    document.body.appendChild(s);
    setTimeout(() => s.remove(), 8000);
}, 400);

const steps = [
    {
        text: "Hello Shannel. I made this HTML for you.",
        question: "What is this?",
        buttons: [{ label: "Tell me", next: 1 }]
    },
    {
        text: "I wanted to do something small but thoughtful.",
        question: "Why did you make this?",
        buttons: [{ label: "Because you matter to me", next: 2 }]
    },
    {
        text: "I really enjoy talking to you. You make things feel lighter.",
        question: "Is this something real?",
        buttons: [{ label: "Yes, it is", next: 3 }]
    },
    {
        text: "So I just want to ask you honestly.",
        question: "Would you like to be my girlfriend?",
        buttons: [
            { label: "Yes", yes: true },
            { label: "No", no: true }
        ]
    }
];

let step = 0;

function playMusic() {
    if (music.paused) music.play();
}

function typeText(text, callback) {
    textEl.innerHTML = "";
    let i = 0;
    const interval = setInterval(() => {
        textEl.innerHTML += text.charAt(i);
        i++;
        if (i >= text.length) {
            clearInterval(interval);
            setTimeout(callback, 300);
        }
    }, 42 + Math.random() * 20);
}

function moveALot(btn) {
    const c = document.querySelector(".buttons");
    const maxX = c.offsetWidth - btn.offsetWidth;
    const maxY = c.offsetHeight - btn.offsetHeight;
    btn.style.left = Math.random() * maxX + "px";
    btn.style.top = Math.random() * maxY + "px";
}

function renderStep() {
    buttonsEl.innerHTML = "";
    questionEl.innerHTML = "";

    typeText(steps[step].text, () => {
        questionEl.textContent = steps[step].question;

        steps[step].buttons.forEach(btn => {
            const b = document.createElement("button");
            b.textContent = btn.label;
            b.className = btn.yes ? "primary" : "secondary";

            if (btn.no) {
                b.addEventListener("mouseenter", () => moveALot(b));
                b.addEventListener("touchstart", () => moveALot(b));
            }

            b.onclick = () => {
                playMusic();
                if (btn.next !== undefined) {
                    step = btn.next;
                    renderStep();
                }
                if (btn.yes) showYes();
            };

            buttonsEl.appendChild(b);
        });
    });
}

function showYes() {
    textEl.innerHTML = "";
    questionEl.innerHTML = "";
    buttonsEl.innerHTML = "";

    typeText("Wait... is this real?", () => {
        const b = document.createElement("button");
        b.textContent = "Yes, wallahi bro, it is real.";
        b.className = "primary";
        b.onclick = finalMessage;
        buttonsEl.appendChild(b);
    });
}

function finalMessage() {
    textEl.innerHTML = "";
    typeText(
        "It is real. I like you, and I want to get to know you better. Thank you for saying yes.",
        () => {}
    );
}

renderStep();
</script>

</body>
</html>
