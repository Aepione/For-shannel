<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For You</title>

<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400&family=Playfair+Display:ital,wght@0,500;1,500&display=swap" rel="stylesheet">

<style>
* { box-sizing: border-box; }

body {
  margin: 0;
  height: 100vh;
  background: linear-gradient(135deg, #fde6ec, #fff1f5);
  display: flex;
  justify-content: center;
  align-items: center;
  overflow: hidden;
}

/* floating hearts */
.heart {
  position: absolute;
  font-size: 16px;
  color: rgba(231,84,128,0.35);
  animation: floatUp linear forwards;
  pointer-events: none;
}

@keyframes floatUp {
  from { transform: translateY(120vh); opacity: 0; }
  20% { opacity: 1; }
  to { transform: translateY(-10vh); opacity: 0; }
}

/* card */
.card {
  background: #fff;
  width: 90%;
  max-width: 430px;
  padding: 44px;
  border-radius: 30px;
  box-shadow: 0 25px 55px rgba(231,84,128,0.22);
  animation: fadeUp 1s ease forwards, pulse 6s ease-in-out infinite;
}

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(28px); }
  to { opacity: 1; transform: translateY(0); }
}

@keyframes pulse {
  0%,100% { transform: scale(1); }
  50% { transform: scale(1.01); }
}

.text {
  font-family: 'JetBrains Mono', monospace;
  font-size: 15px;
  color: #5a2f3c;
  line-height: 1.9;
  min-height: 135px;
}

.question {
  font-family: 'Playfair Display', serif;
  font-size: 18px;
  color: #c04b73;
  margin-top: 22px;
}

.buttons {
  margin-top: 26px;
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
}

button {
  padding: 11px 24px;
  border-radius: 24px;
  border: none;
  font-size: 13px;
  cursor: pointer;
  transition: transform 0.15s ease, box-shadow 0.15s ease;
}

button:active { transform: scale(0.95); }

button.wiggle {
  animation: wiggle 0.4s ease;
}

@keyframes wiggle {
  0% { transform: rotate(0deg); }
  25% { transform: rotate(-2deg); }
  50% { transform: rotate(2deg); }
  75% { transform: rotate(-1deg); }
  100% { transform: rotate(0deg); }
}

.primary {
  background: #e75480;
  color: white;
  box-shadow: 0 14px 30px rgba(231,84,128,0.45);
}

.secondary {
  background: transparent;
  border: 1px solid #f3b6c6;
  color: #9a4f65;
}
</style>
</head>

<body>

<audio id="music" loop>
  <source src="love.mp3" type="audio/mpeg">
</audio>

<div class="card" id="card">
  <div class="text" id="text"></div>
  <div class="question" id="question"></div>
  <div class="buttons" id="buttons"></div>
</div>

<script>
const textEl = document.getElementById("text");
const questionEl = document.getElementById("question");
const buttonsEl = document.getElementById("buttons");
const music = document.getElementById("music");

music.volume = 0.45;

/* hearts */
let heartSpeed = 900;
setInterval(() => {
  const h = document.createElement("div");
  h.className = "heart";
  h.textContent = "♡";
  h.style.left = Math.random()*100 + "vw";
  h.style.fontSize = 14 + Math.random()*8 + "px";
  h.style.animationDuration = 6 + Math.random()*4 + "s";
  document.body.appendChild(h);
  setTimeout(()=>h.remove(),9000);
}, heartSpeed);

const brainrotReplies = [
  "Why are you clicking everything 😭",
  "This was not part of the plan but okay",
  "You’re kinda stuck here ngl",
  "Okay focus… maybe",
  "Brochachi relax"
];

const steps = [
  {
    text: "Hello Shannel. I made this HTML for you.",
    question: "What is this?",
    buttons: [
      { label: "Is this a scam 😭", brainrot: true },
      { label: "Why is this lowkey cute", brainrot: true },
      { label: "Bro what am I clicking", brainrot: true },
      { label: "Skibidi explanation pls", brainrot: true },
      { label: "Okay okay tell me fr", next: 1 }
    ]
  },
  {
    text: "I wanted to do something thoughtful. Something that felt personal.",
    question: "Why did you make this?",
    buttons: [{ label: "Because you matter to me", next: 2 }]
  },
  {
    text: "I enjoy talking to you, and I feel comfortable being myself with you.",
    question: "Is this something real?",
    buttons: [{ label: "Yes, it is", next: 3 }]
  },
  {
    text: "So I just want to ask you honestly.",
    question: "Would you like to be my girlfriend?",
    buttons: [
      { label: "Yes", yes: true },
      { label: "No", no: true }
    ]
  }
];

let step = 0;

function playMusic() {
  if (music.paused) music.play();
}

function typeText(text, cb) {
  textEl.innerHTML = "";
  let i = 0;
  const timer = setInterval(() => {
    textEl.innerHTML += text.charAt(i);
    i++;
    if (i >= text.length) {
      clearInterval(timer);
      setTimeout(cb, 300);
    }
  }, 40);
}

function render() {
  buttonsEl.innerHTML = "";
  questionEl.textContent = "";

  typeText(steps[step].text, () => {
    questionEl.textContent = steps[step].question;

    steps[step].buttons.forEach(opt => {
      const b = document.createElement("button");
      b.textContent = opt.label;
      b.className = opt.yes ? "primary" : "secondary";

      b.onclick = () => {
        playMusic();
        b.classList.add("wiggle");

        if (opt.brainrot) {
          const reply = brainrotReplies[Math.floor(Math.random()*brainrotReplies.length)];
          typeText(reply, () => {
            questionEl.textContent = "Okay… but seriously…";
          });
          buttonsEl.appendChild(b);
          return;
        }

        if (opt.next !== undefined) {
          step = opt.next;
          render();
        }

        if (opt.yes) ending();
      };

      buttonsEl.appendChild(b);
    });
  });
}

function ending() {
  document.getElementById("card").remove();

  const end = document.createElement("div");
  end.style.position = "fixed";
  end.style.inset = "0";
  end.style.background = "linear-gradient(135deg, #fde6ec, #fff1f5)";
  end.style.display = "flex";
  end.style.flexDirection = "column";
  end.style.justifyContent = "center";
  end.style.alignItems = "center";
  end.innerHTML = `
    <h1 style="font-family:Playfair Display;color:#b93a64;">♡</h1>
    <p style="font-family:JetBrains Mono;color:#5a2f3c;text-align:center;max-width:300px;line-height:1.8;">
      I like you. I really do.<br><br>
      And I want to get to know you better,<br>
      at your pace, in your time.
    </p>
  `;
  document.body.appendChild(end);
}

render();
</script>

</body>
</html>
